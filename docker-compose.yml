version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: blenko_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blenko_discovery}
      POSTGRES_USER: ${POSTGRES_USER:-blenko_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blenko_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blenko_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blenko_admin} -d ${POSTGRES_DB:-blenko_discovery}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blenko_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blenko_admin}:${POSTGRES_PASSWORD:-blenko_secure_password}@postgres:5432/${POSTGRES_DB:-blenko_discovery}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - blenko_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    container_name: blenko_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - blenko_network
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro

networks:
  blenko_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
